name: Build IGYM

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix all line endings (The Ultimate Fix)
        run: |
          sudo apt-get update
          sudo apt-get install dos2unix -y
          find . -type f -name "gradlew" -exec dos2unix {} +
          find . -type f -name "*.properties" -exec dos2unix {} +
          chmod +x gradlew

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,O=Android,C=US"

      - name: Create .env placeholder
        run: |
          touch .env
          touch .env.example

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: bash ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          JAVA_OPTS: "-Xmx2048m -Dfile.encoding=UTF-8"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: IGYM-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
